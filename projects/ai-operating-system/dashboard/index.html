<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>James OS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="setup-banner" class="setup-banner hidden">
    <span>⚠ ClickUp not configured.</span>
    <span>Copy <code>config.example.js</code> → <code>config.js</code> and add your API key. The Daily tab needs it; other tabs work without it.</span>
  </div>

  <header class="header">
    <div class="header-brand">
      <span class="brand-dot"></span>
      <span class="brand-name">JAMES OS</span>
    </div>
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="daily">Daily Focus</button>
      <button class="tab-btn" data-tab="habits">Habits</button>
      <button class="tab-btn" data-tab="goals">Goals</button>
      <button class="tab-btn" data-tab="finances">Finances</button>
      <button class="tab-btn" data-tab="trading">Trading</button>
    </nav>
    <div class="header-time" id="header-clock"></div>
  </header>

  <main class="main">
    <section id="tab-overview" class="tab-panel active"></section>
    <section id="tab-daily" class="tab-panel"></section>
    <section id="tab-habits" class="tab-panel"></section>
    <section id="tab-goals" class="tab-panel"></section>
    <section id="tab-finances" class="tab-panel"></section>
    <section id="tab-trading" class="tab-panel"></section>
  </main>

  <script>var CONFIG = null;</script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="tabs/daily.js"></script>
  <script src="tabs/habits.js"></script>
  <script src="tabs/goals.js"></script>
  <script src="tabs/finances.js"></script>
  <script src="tabs/trading.js"></script>
  <script src="tabs/overview.js"></script>
</body>
</html>
